<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作業管理系統 - 電腦/手機雙優化版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { 
            height: 100vh; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            background-color: #fdf6e3; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Microsoft JhengHei", sans-serif;
        }
        .main-container { flex: 1; overflow: hidden; display: flex; flex-direction: column; max-width: 1800px; margin: 0 auto; width: 100%; }
        
        /* 表格滾動區域 */
        .table-wrapper { flex: 1; overflow: auto; background: #fffdf9; border-top: 1px solid #e2d7bf; }
        
        /* 按鈕設計：電腦/手機兼容 */
        .status-btn {
            transition: all 0.1s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 65px;
            width: 100%;
            border-radius: 8px;
            position: relative;
        }
        
        /* 狀態文字大小 */
        .btn-label-idx { position: absolute; top: 4px; left: 6px; font-size: 0.75rem; font-weight: 700; opacity: 0.6; }
        .btn-label-status { font-size: 1.15rem; font-weight: 900; }

        /* 顏色深色化 (暖色系) */
        .status-0 { background-color: #e2e8f0; color: #475569; border: 1px solid #94a3b8; }
        .status-1 { background-color: #f97316; color: #ffffff; border: 2px solid #ea580c; box-shadow: 0 2px 0 #9a3412; } /* 待訂正 */
        .status-2 { background-color: #2563eb; color: #ffffff; border: 2px solid #1d4ed8; box-shadow: 0 2px 0 #1e3a8a; } /* 已完成 */
        
        /* 電腦端懸停 */
        @media (hover: hover) {
            .status-btn:hover { filter: brightness(0.9); cursor: pointer; }
        }

        /* 響應式調整 */
        @media (max-width: 640px) {
            .btn-label-status { font-size: 1rem; }
            .status-btn { height: 55px; }
            th, td { padding: 0.25rem !important; }
        }

        th { position: sticky; top: 0; background: #f5ede0; z-index: 20; border-bottom: 2px solid #e2d7bf; font-weight: 900; }
        .sticky-idx { position: sticky; left: 0; background: #f5ede0; z-index: 10; border-right: 2px solid #e2d7bf; font-weight: 900; }
    </style>
</head>
<body class="p-0 sm:p-2">

    <div class="main-container bg-white shadow-lg sm:rounded-2xl overflow-hidden">
        
        <div class="px-4 py-3 bg-amber-950 text-white flex justify-between items-center shrink-0">
            <h1 class="font-black text-lg">作業紀錄</h1>
            <div class="flex gap-2">
                <button onclick="exportExcel()" class="bg-emerald-600 px-3 py-1.5 rounded-lg text-sm font-bold">Excel</button>
                <button onclick="clearAllData()" class="text-amber-400 text-xs underline">重設</button>
            </div>
        </div>

        <div class="p-3 grid grid-cols-1 sm:grid-cols-2 gap-3 border-b bg-orange-50/50 shrink-0">
            <div class="flex items-center justify-between sm:justify-start gap-3">
                <label class="text-sm font-bold">人數:</label>
                <input type="number" id="studentCount" value="5" class="w-20 p-2 border rounded-lg font-bold text-center" onchange="saveAndRender()">
                <div class="text-xs text-gray-400 hidden sm:block">數據自動儲存</div>
            </div>
            <div class="flex gap-2">
                <input type="text" id="taskName" placeholder="作業名稱" class="flex-1 p-2 border rounded-lg text-sm font-bold">
                <button onclick="addTask()" class="bg-amber-800 text-white px-4 rounded-lg font-bold text-sm">新增</button>
            </div>
        </div>

        <div class="table-wrapper">
            <table class="w-full border-collapse">
                <thead>
                    <tr id="tableHeader">
                        <th class="p-3 w-14 sticky-idx">#</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>

        <div class="p-4 bg-amber-50 border-t grid grid-cols-1 sm:grid-cols-2 gap-4 shrink-0 overflow-y-auto max-h-40">
            <div class="bg-white/50 p-3 rounded-lg border border-amber-100">
                <h3 class="text-xs font-black text-gray-500 mb-1">● 尚未繳交</h3>
                <div id="missingReport" class="text-sm font-bold text-gray-700 leading-relaxed"></div>
            </div>
            <div class="bg-white p-3 rounded-lg border border-orange-200 shadow-sm">
                <h3 class="text-xs font-black text-orange-600 mb-1">● 待訂正</h3>
                <div id="correctionReport" class="text-sm font-bold text-orange-800 leading-relaxed"></div>
            </div>
        </div>
    </div>

    <script>
        let tasks = [];
        let submissions = {}; 

        function init() {
            const t = localStorage.getItem('v6_tasks');
            const s = localStorage.getItem('v6_sub');
            const c = localStorage.getItem('v6_count');
            if (t) tasks = JSON.parse(t);
            if (s) submissions = JSON.parse(s);
            if (c) document.getElementById('studentCount').value = c;
            renderTable();
        }

        function saveAndRender() {
            localStorage.setItem('v6_tasks', JSON.stringify(tasks));
            localStorage.setItem('v6_sub', JSON.stringify(submissions));
            localStorage.setItem('v6_count', document.getElementById('studentCount').value);
            renderTable();
        }

        function addTask() {
            const input = document.getElementById('taskName');
            const val = input.value.trim();
            if (!val || tasks.includes(val)) return;
            tasks.push(val);
            input.value = '';
            saveAndRender();
        }

        function cycleStatus(id, task) {
            if (!submissions[id]) submissions[id] = {};
            let curr = submissions[id][task] || 0;
            submissions[id][task] = (curr + 1) % 3;
            saveAndRender();
        }

        function renderTable() {
            const count = parseInt(document.getElementById('studentCount').value) || 0;
            const header = document.getElementById('tableHeader');
            const body = document.getElementById('tableBody');

            header.innerHTML = '<th class="p-3 border-b border-amber-100 bg-amber-50 sticky-idx text-amber-900">座號</th>';
            tasks.forEach((t, i) => {
                header.innerHTML += `<th class="p-3 border-b border-amber-100 bg-amber-50 text-amber-900 min-w-[110px] sm:min-w-[140px] font-black text-sm sm:text-base">
                    ${t} <button onclick="deleteTask(${i})" class="text-amber-300 ml-1">×</button>
                </th>`;
            });

            body.innerHTML = '';
            for (let i = 1; i <= count; i++) {
                let row = `<tr><td class="p-2 border-b border-amber-50 text-center font-black sticky-idx text-amber-800 bg-amber-50/30">${i}</td>`;
                tasks.forEach(t => {
                    const s = (submissions[i] && submissions[i][t]) || 0;
                    const labels = ["未交", "待訂正", "完成"];
                    row += `<td class="p-1.5 border-b border-amber-50">
                                <button onclick="cycleStatus(${i},'${t}')" class="status-btn status-${s}">
                                    <span class="btn-label-idx">${i}</span>
                                    <span class="btn-label-status">${labels[s]}</span>
                                </button>
                            </td>`;
                });
                row += `</tr>`;
                body.innerHTML += row;
            }
            updateReports(count);
        }

        function updateReports(count) {
            const mDiv = document.getElementById('missingReport');
            const cDiv = document.getElementById('correctionReport');
            mDiv.innerHTML = ''; cDiv.innerHTML = '';
            tasks.forEach(t => {
                let m = [], c = [];
                for (let i = 1; i <= count; i++) {
                    const s = (submissions[i] && submissions[i][t]) || 0;
                    if (s === 0) m.push(i); if (s === 1) c.push(i);
                }
                if (m.length) mDiv.innerHTML += `<div class="mb-1">${t}: ${m.join(', ')}</div>`;
                if (c.length) cDiv.innerHTML += `<div class="mb-1">${t}: ${c.join(', ')}</div>`;
            });
        }

        function deleteTask(i) { if(confirm('刪除作業？')) { tasks.splice(i, 1); saveAndRender(); } }
        function clearAllData() { if(confirm('重設？')) { localStorage.clear(); location.reload(); } }

        function exportExcel() {
            const count = parseInt(document.getElementById('studentCount').value);
            let data = [];
            for (let i = 1; i <= count; i++) {
                let obj = { '座號': i };
                tasks.forEach(t => {
                    const s = (submissions[i] && submissions[i][t]) || 0;
                    obj[t] = ["未交", "待訂正", "已完成"][s];
                });
                data.push(obj);
            }
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "作業");
            XLSX.writeFile(wb, `作業紀錄_${new Date().toLocaleDateString()}.xlsx`);
        }
        init();
    </script>
</body>
</html>
