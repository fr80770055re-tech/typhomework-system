<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>班級管理系統 - 客製化版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style id="dynamicStyles">
        :root { --base-font-size: 16px; }
        body { 
            height: 100vh; overflow: hidden; display: flex; flex-direction: column; 
            background-color: #fdf6e3; font-size: var(--base-font-size);
            font-family: "Microsoft JhengHei", sans-serif;
        }
        .main-container { flex: 1; overflow: hidden; display: flex; flex-direction: column; max-width: 1800px; margin: 0 auto; width: 100%; }
        
        /* 滾動區域 */
        .scroll-section { flex: 1; overflow: auto; background: #fffdf9; border-top: 2px solid #e2d7bf; }
        
        /* 正方形按鈕樣式 */
        .square-btn {
            transition: all 0.1s ease; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; border-radius: 8px; position: relative;
            aspect-ratio: 1 / 1; /* 強制正方形 */
            width: 100%; min-width: 60px; max-width: 100px; margin: 0 auto;
        }
        .btn-idx { position: absolute; top: 2px; left: 4px; font-size: 0.6em; font-weight: 700; opacity: 0.5; }
        .btn-text { font-size: 1em; font-weight: 900; }

        /* 狀態顏色 */
        .task-0 { background-color: #e2e8f0; color: #475569; border: 1px solid #94a3b8; }
        .task-1 { background-color: #f97316; color: #fff; border: 2px solid #ea580c; }
        .task-2 { background-color: #2563eb; color: #fff; border: 2px solid #1d4ed8; }

        .att-0 { background-color: #d1fae5; color: #065f46; border: 1px solid #10b981; }
        .att-1 { background-color: #fef3c7; color: #92400e; border: 2px solid #fbbf24; }
        .att-2 { background-color: #fee2e2; color: #991b1b; border: 2px solid #ef4444; }
        .att-3 { background-color: #dcfce7; color: #166534; border: 2px solid #22c55e; }
        .att-4 { background-color: #f3f4f6; color: #1f2937; border: 2px solid #4b5563; }
        .att-5 { background-color: #f3e8ff; color: #6b21a8; border: 2px solid #a855f7; }

        th { position: sticky; top: 0; background: #f5ede0; z-index: 20; border-bottom: 2px solid #e2d7bf; font-weight: 900; padding: 10px; }
        .sticky-idx { position: sticky; left: 0; background: #f5ede0; z-index: 10; border-right: 2px solid #e2d7bf; font-weight: 900; }
        
        .tab-active { background-color: #78350f !important; color: #fff !important; }
        .tab-inactive { background-color: #e2d7bf; color: #78350f; }
    </style>
</head>
<body class="p-0 sm:p-2">

    <div class="main-container bg-white shadow-lg sm:rounded-2xl overflow-hidden">
        
        <div class="px-4 py-2 bg-amber-950 text-white flex flex-wrap justify-between items-center shrink-0 gap-2">
            <h1 class="font-black text-lg">班務管家 v9</h1>
            <div class="flex items-center gap-4 bg-amber-900/50 p-2 rounded-lg">
                <label class="text-xs font-bold">字體大小:</label>
                <input type="range" min="12" max="30" value="16" id="fontSizeSlider" oninput="updateFontSize(this.value)">
                <span id="fontSizeVal" class="text-xs font-mono w-8">16px</span>
            </div>
            <div class="flex gap-2">
                <button onclick="exportExcel()" class="bg-emerald-600 px-3 py-1 rounded-lg text-xs font-bold shadow">匯出 Excel</button>
                <button onclick="clearAllData()" class="text-amber-400 text-[10px] underline">重設</button>
            </div>
        </div>

        <div class="p-3 flex flex-wrap items-center justify-between gap-4 border-b bg-orange-50/50 shrink-0">
            <div class="flex items-center gap-2">
                <input type="date" id="currentDate" class="bg-white border-2 border-amber-200 rounded p-1 font-bold text-amber-900" onchange="renderAll()">
                <div class="flex items-center gap-1 ml-4">
                    <label class="text-xs font-bold text-amber-800">人數:</label>
                    <input type="number" id="studentCount" value="5" class="w-14 p-1 border rounded font-bold text-center" onchange="saveAndRender()">
                </div>
            </div>
            <div id="taskInputGroup" class="flex gap-2">
                <input type="text" id="taskName" placeholder="作業名" class="w-24 p-1 border rounded text-sm font-bold shadow-sm">
                <button onclick="addTask()" class="bg-amber-800 text-white px-2 py-1 rounded font-bold text-xs">新增</button>
            </div>
        </div>

        <div class="flex shrink-0">
            <button id="btnTaskTab" onclick="switchTab('task')" class="flex-1 py-3 font-black tab-active border-r border-amber-900">📚 作業管理</button>
            <button id="btnAttTab" onclick="switchTab('att')" class="flex-1 py-3 font-black tab-inactive">📅 出缺勤</button>
        </div>

        <div id="taskView" class="scroll-section">
            <table class="w-full border-collapse">
                <thead><tr id="taskHeader"><th class="p-3 w-16 sticky-idx">座號</th></tr></thead>
                <tbody id="taskBody"></tbody>
            </table>
        </div>

        <div id="attView" class="scroll-section hidden">
            <table class="w-full border-collapse">
                <thead><tr><th class="p-3 w-16 sticky-idx">座號</th><th class="p-3 text-left">點擊狀態</th></tr></thead>
                <tbody id="attendanceBody"></tbody>
            </table>
        </div>

        <div class="p-3 bg-amber-50 border-t flex flex-col gap-2 shrink-0 overflow-y-auto max-h-32 text-xs font-bold">
            <div id="reportSummary" class="text-amber-900"></div>
        </div>
    </div>

    <script>
        let history = {};
        let tasks = [];
        let currentTab = 'task';
        const attLabels = ["出席", "事假", "病假", "公假", "喪假", "遲到"];

        function updateFontSize(val) {
            document.documentElement.style.setProperty('--base-font-size', val + 'px');
            document.getElementById('fontSizeVal').innerText = val + 'px';
            localStorage.setItem('v9_font_size', val);
        }

        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('taskView').classList.toggle('hidden', tab !== 'task');
            document.getElementById('attView').classList.toggle('hidden', tab !== 'att');
            document.getElementById('taskInputGroup').classList.toggle('hidden', tab !== 'task');
            
            document.getElementById('btnTaskTab').className = tab === 'task' ? 'flex-1 py-3 font-black tab-active' : 'flex-1 py-3 font-black tab-inactive';
            document.getElementById('btnAttTab').className = tab === 'att' ? 'flex-1 py-3 font-black tab-active' : 'flex-1 py-3 font-black tab-inactive';
            renderAll();
        }

        function init() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('currentDate').value = today;

            // 讀取存儲
            const h = localStorage.getItem('v9_history');
            const t = localStorage.getItem('v9_tasks');
            const c = localStorage.getItem('v9_count');
            const f = localStorage.getItem('v9_font_size');
            
            if (h) history = JSON.parse(h);
            if (t) tasks = JSON.parse(t);
            if (c) document.getElementById('studentCount').value = c;
            if (f) { updateFontSize(f); document.getElementById('fontSizeSlider').value = f; }
            
            renderAll();
        }

        function saveAndRender() {
            localStorage.setItem('v9_history', JSON.stringify(history));
            localStorage.setItem('v9_tasks', JSON.stringify(tasks));
            localStorage.setItem('v9_count', document.getElementById('studentCount').value);
            renderAll();
        }

        function renderAll() {
            const date = document.getElementById('currentDate').value;
            const count = parseInt(document.getElementById('studentCount').value) || 0;
            if (!history[date]) history[date] = { taskData: {}, attData: {} };
            const dateInfo = history[date];

            // 1. 作業渲染
            const tHeader = document.getElementById('taskHeader');
            const tBody = document.getElementById('taskBody');
            tHeader.innerHTML = '<th class="sticky-idx">座號</th>';
            tasks.forEach((t, i) => {
                tHeader.innerHTML += `<th class="min-w-[80px]">${t}<br><button onclick="deleteTask(${i})" class="text-red-400 text-[10px]">✕</button></th>`;
            });
            tBody.innerHTML = '';
            for (let i = 1; i <= count; i++) {
                let row = `<tr><td class="p-2 border-b text-center font-black sticky-idx bg-amber-50/30">${i}</td>`;
                tasks.forEach(t => {
                    const s = (dateInfo.taskData[i] && dateInfo.taskData[i][t]) || 0;
                    const lbls = ["未交", "待訂", "完成"];
                    row += `<td class="p-2 border-b"><button onclick="cycleTask(${i},'${t}')" class="square-btn task-${s}"><span class="btn-idx">${i}</span><span class="btn-text">${lbls[s]}</span></button></td>`;
                });
                tBody.innerHTML += row + '</tr>';
            }

            // 2. 出勤渲染
            const aBody = document.getElementById('attendanceBody');
            aBody.innerHTML = '';
            for (let i = 1; i <= count; i++) {
                const s = dateInfo.attData[i] || 0;
                aBody.innerHTML += `<tr><td class="p-2 border-b text-center font-black sticky-idx bg-amber-50/30">${i}</td><td class="p-2 border-b grid grid-cols-4 gap-2"><button onclick="cycleAttendance(${i})" class="square-btn att-${s}"><span class="btn-idx">${i}</span><span class="btn-text">${attLabels[s]}</span></button></td></tr>`;
            }

            // 3. 報表彙整
            const report = document.getElementById('reportSummary');
            let mList = []; let aList = [];
            tasks.forEach(t => {
                let m = []; for(let i=1; i<=count; i++) if((dateInfo.taskData[i]||{})[t] !== 2) m.push(i);
                if(m.length) mList.push(`[${t}: ${m.join(',')}]`);
            });
            for(let i=1; i<=count; i++) if(dateInfo.attData[i]>0) aList.push(`${i}(${attLabels[dateInfo.attData[i]]})`);
            report.innerHTML = `未完: ${mList.join(' ')}<br>異動: ${aList.join(', ')}`;
        }

        // 功能邏輯
        function addTask() {
            const val = document.getElementById('taskName').value.trim();
            if (!val || tasks.includes(val)) return;
            tasks.push(val); document.getElementById('taskName').value = ''; saveAndRender();
        }
        function cycleTask(id, t) {
            const d = document.getElementById('currentDate').value;
            if(!history[d].taskData[id]) history[d].taskData[id]={};
            history[d].taskData[id][t] = ((history[d].taskData[id][t]||0)+1)%3; saveAndRender();
        }
        function cycleAttendance(id) {
            const d = document.getElementById('currentDate').value;
            history[d].attData[id] = ((history[d].attData[id]||0)+1)%6; saveAndRender();
        }
        function deleteTask(i) { if(confirm('刪除作業？')) { tasks.splice(i, 1); saveAndRender(); } }
        function clearAllData() { if(confirm('清除所有紀錄？')) { localStorage.clear(); location.reload(); } }
        function exportExcel() {
            const date = document.getElementById('currentDate').value;
            const info = history[date];
            const count = parseInt(document.getElementById('studentCount').value);
            let data = [];
            for (let i = 1; i <= count; i++) {
                let obj = { '座號': i, '出勤': attLabels[info.attData[i]||0] };
                tasks.forEach(t => obj[t] = ["未交", "待訂正", "已完成"][(info.taskData[i]||{})[t]||0]);
                data.push(obj);
            }
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "紀錄");
            XLSX.writeFile(wb, `班級報表_${date}.xlsx`);
        }
        init();
    </script>
</body>
</html>
