<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>學生作業繳交與訂正系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        /* 16:9 比例與寬度優化 */
        .container-16-9 {
            width: 95vw;
            max-width: 1600px;
            margin: 0 auto;
            aspect-ratio: 16 / 9;
        }
        /* 狀態顏色定義 */
        .status-btn {
            transition: all 0.1s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 70px;
        }
        .status-unsubmitted { background-color: #f3f4f6; color: #9ca3af; border: 2px dashed #d1d5db; } /* 未交 */
        .status-submitted { background-color: #d1fae5; color: #065f46; border: 2px solid #10b981; }   /* 已交未訂正 */
        .status-corrected { background-color: #dbeafe; color: #1e40af; border: 2px solid #3b82f6; }   /* 已訂正 */
        
        .sticky-col { position: sticky; left: 0; background: white; z-index: 5; }
        th { position: sticky; top: 0; background: #f3f4f6; z-index: 10; }
    </style>
</head>
<body class="bg-gray-200 p-4">

    <div class="container-16-9 bg-white shadow-2xl rounded-2xl flex flex-col overflow-hidden">
        
        <div class="p-6 bg-slate-800 text-white flex justify-between items-center shrink-0">
            <div class="flex items-center gap-4">
                <h1 class="text-2xl font-bold">📋 學生作業紀錄系統</h1>
                <span class="bg-yellow-500 text-slate-900 px-2 py-1 rounded text-xs font-bold">寬螢幕 16:9 版</span>
            </div>
            <div class="flex gap-3">
                <button onclick="exportExcel()" class="bg-emerald-500 hover:bg-emerald-600 px-5 py-2 rounded-lg font-bold transition">📊 匯出 Excel</button>
                <button onclick="clearAllData()" class="bg-red-500 hover:bg-red-600 px-5 py-2 rounded-lg font-bold transition text-sm">重設系統</button>
            </div>
        </div>

        <div class="flex-1 overflow-auto p-6 flex flex-col gap-6">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 bg-slate-50 p-4 rounded-xl border border-slate-200">
                <div class="flex flex-col gap-2">
                    <label class="font-bold text-slate-600">1. 設定學生總人數</label>
                    <input type="number" id="studentCount" value="5" class="p-3 border-2 rounded-lg focus:ring-2 focus:ring-blue-400 outline-none" onchange="saveAndRender()">
                </div>
                <div class="flex flex-col gap-2">
                    <label class="font-bold text-slate-600">2. 新增作業名稱</label>
                    <div class="flex gap-2">
                        <input type="text" id="taskName" placeholder="例如：數習 L1" class="flex-1 p-3 border-2 rounded-lg focus:ring-2 focus:ring-purple-400 outline-none">
                        <button onclick="addTask()" class="bg-purple-600 text-white px-6 rounded-lg font-bold">新增</button>
                    </div>
                </div>
            </div>

            <div class="border rounded-xl overflow-hidden bg-white shadow-sm">
                <table class="w-full text-sm">
                    <thead>
                        <tr id="tableHeader">
                            <th class="p-4 border-b w-24">座號</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div class="bg-red-50 p-6 rounded-xl border border-red-100">
                    <h3 class="text-lg font-bold text-red-700 mb-4">📢 尚未繳交名單</h3>
                    <div id="missingReport" class="flex flex-col gap-2"></div>
                </div>
                <div class="bg-blue-50 p-6 rounded-xl border border-blue-100">
                    <h3 class="text-lg font-bold text-blue-700 mb-4">✍️ 尚未訂正名單</h3>
                    <div id="correctionReport" class="flex flex-col gap-2"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let tasks = [];
        let submissions = {}; // {座號: {作業名: 0=未交, 1=已交未訂, 2=已訂正}}

        function init() {
            const savedTasks = localStorage.getItem('v2_tasks');
            const savedSub = localStorage.getItem('v2_submissions');
            const savedCount = localStorage.getItem('v2_count');

            if (savedTasks) tasks = JSON.parse(savedTasks);
            if (savedSub) submissions = JSON.parse(savedSub);
            if (savedCount) document.getElementById('studentCount').value = savedCount;

            renderTable();
        }

        function saveData() {
            localStorage.setItem('v2_tasks', JSON.stringify(tasks));
            localStorage.setItem('v2_submissions', JSON.stringify(submissions));
            localStorage.setItem('v2_count', document.getElementById('studentCount').value);
        }

        function saveAndRender() {
            saveData();
            renderTable();
        }

        function addTask() {
            const input = document.getElementById('taskName');
            const val = input.value.trim();
            if (!val || tasks.includes(val)) return;
            tasks.push(val);
            input.value = '';
            saveAndRender();
        }

        // 切換狀態：未交 -> 已交 -> 已訂正 -> 未交
        function cycleStatus(studentId, taskName) {
            if (!submissions[studentId]) submissions[studentId] = {};
            let current = submissions[studentId][taskName] || 0;
            submissions[studentId][taskName] = (current + 1) % 3;
            saveAndRender();
        }

        function renderTable() {
            const count = parseInt(document.getElementById('studentCount').value) || 0;
            const header = document.getElementById('tableHeader');
            const body = document.getElementById('tableBody');

            // 渲染表頭
            header.innerHTML = '<th class="p-4 border-b bg-gray-50 text-slate-500">座號</th>';
            tasks.forEach((t, i) => {
                header.innerHTML += `
                    <th class="p-4 border-b bg-gray-50 text-slate-700">
                        ${t} <button onclick="deleteTask(${i})" class="text-red-300 hover:text-red-500 ml-1">✕</button>
                    </th>`;
            });

            // 渲染表身
            body.innerHTML = '';
            for (let i = 1; i <= count; i++) {
                let row = `<tr><td class="p-4 border-b text-center font-bold bg-gray-50">${i}</td>`;
                tasks.forEach(t => {
                    const status = (submissions[i] && submissions[i][t]) || 0;
                    let btnClass = "status-unsubmitted";
                    let label = "未交";
                    if (status === 1) { btnClass = "status-submitted"; label = "已交"; }
                    if (status === 2) { btnClass = "status-corrected"; label = "完成"; }

                    row += `
                        <td class="p-2 border-b">
                            <button onclick="cycleStatus(${i}, '${t}')" class="w-full rounded-lg status-btn ${btnClass} shadow-sm">
                                <span class="text-xs opacity-60">${i} 號</span>
                                <span class="font-bold">${label}</span>
                            </button>
                        </td>`;
                });
                row += `</tr>`;
                body.innerHTML += row;
            }

            updateReports(count);
        }

        function updateReports(count) {
            const missingDiv = document.getElementById('missingReport');
            const correctionDiv = document.getElementById('correctionReport');
            missingDiv.innerHTML = '';
            correctionDiv.innerHTML = '';

            tasks.forEach(t => {
                let missing = [];
                let needCorrection = [];
                for (let i = 1; i <= count; i++) {
                    const status = (submissions[i] && submissions[i][t]) || 0;
                    if (status === 0) missing.push(i);
                    if (status === 1) needCorrection.push(i);
                }
                
                if (missing.length > 0) {
                    missingDiv.innerHTML += `<div class="bg-white p-2 rounded shadow-sm text-sm border-l-4 border-red-500"><strong>${t}:</strong> ${missing.join(', ')} 號</div>`;
                }
                if (needCorrection.length > 0) {
                    correctionDiv.innerHTML += `<div class="bg-white p-2 rounded shadow-sm text-sm border-l-4 border-blue-500"><strong>${t}:</strong> ${needCorrection.join(', ')} 號</div>`;
                }
            });
        }

        function deleteTask(idx) {
            if(confirm('確定刪除作業？')) { tasks.splice(idx, 1); saveAndRender(); }
        }

        function clearAllData() {
            if(confirm('確定重設？所有紀錄會消失！')) { localStorage.clear(); location.reload(); }
        }

        function exportExcel() {
            const count = parseInt(document.getElementById('studentCount').value);
            let data = [];
            for (let i = 1; i <= count; i++) {
                let obj = { '座號': i };
                tasks.forEach(t => {
                    const s = (submissions[i] && submissions[i][t]) || 0;
                    obj[t] = s === 0 ? '未交' : (s === 1 ? '已交未訂正' : '已訂正');
                });
                data.push(obj);
            }
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "統計");
            XLSX.writeFile(wb, `班級作業_${new Date().toLocaleDateString()}.xlsx`);
        }

        init();
    </script>
</body>
</html>
