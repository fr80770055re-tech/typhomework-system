<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>學生作業繳交系統 (具記憶功能)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        .checked-cell { background-color: #d1fae5; border-color: #10b981 !important; }
        .touch-area { min-height: 60px; cursor: pointer; transition: all 0.1s; }
        .touch-area:active { transform: scale(0.95); background-color: #f1f5f9; }
        th { position: sticky; top: 0; background: #f3f4f6; z-index: 10; }
    </style>
</head>
<body class="bg-gray-100 p-4">

    <div class="max-w-6xl mx-auto bg-white shadow-2xl rounded-2xl overflow-hidden">
        <div class="p-6 bg-slate-800 text-white flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold">🏫 教學助手：作業管理</h1>
                <p class="text-xs text-slate-400 mt-1">數據已自動儲存於本瀏覽器</p>
            </div>
            <button onclick="exportExcel()" class="bg-emerald-500 hover:bg-emerald-600 px-6 py-2 rounded-lg font-bold shadow-md transition">
                📥 匯出 Excel
            </button>
        </div>

        <div class="p-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                <div class="space-y-2">
                    <label class="font-semibold text-gray-700">學生人數（座號上限）</label>
                    <input type="number" id="studentCount" value="5" class="w-full border-2 border-gray-200 p-3 rounded-xl focus:border-blue-500 outline-none transition" onchange="saveAndRender()">
                </div>
                <div class="space-y-2">
                    <label class="font-semibold text-gray-700">新增作業名稱</label>
                    <div class="flex gap-2">
                        <input type="text" id="taskName" placeholder="輸入作業名，如：數作 P.10" class="flex-1 border-2 border-gray-200 p-3 rounded-xl focus:border-purple-500 outline-none">
                        <button onclick="addTask()" class="bg-purple-600 text-white px-6 py-2 rounded-xl font-bold hover:bg-purple-700">新增</button>
                    </div>
                </div>
            </div>

            <div class="overflow-x-auto border-2 border-gray-100 rounded-xl shadow-inner bg-gray-50" style="max-height: 500px;">
                <table class="w-full text-center border-collapse">
                    <thead>
                        <tr id="tableHeader">
                            <th class="p-4 border-b-2 border-gray-200 w-24">座號</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>

            <div class="mt-10 bg-red-50 p-6 rounded-2xl border-2 border-red-100">
                <div class="flex items-center gap-2 mb-4">
                    <span class="text-2xl">📢</span>
                    <h2 class="text-xl font-black text-red-700">未繳交名單彙整</h2>
                </div>
                <div id="missingReport" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
            </div>
            
            <div class="mt-8 text-right">
                <button onclick="clearAllData()" class="text-sm text-gray-400 hover:text-red-500 underline">清除所有數據並重新開始</button>
            </div>
        </div>
    </div>

    <script>
        let tasks = [];
        let submissions = {}; // {座號: {作業名: true}}

        // --- 核心功能：讀取與儲存 ---
        
        // 初始化：從 localStorage 載入數據
        function init() {
            const savedTasks = localStorage.getItem('teacher_tasks');
            const savedSubmissions = localStorage.getItem('teacher_submissions');
            const savedCount = localStorage.getItem('teacher_studentCount');

            if (savedTasks) tasks = JSON.parse(savedTasks);
            if (savedSubmissions) submissions = JSON.parse(savedSubmissions);
            if (savedCount) document.getElementById('studentCount').value = savedCount;

            renderTable();
        }

        // 儲存數據
        function saveData() {
            localStorage.setItem('teacher_tasks', JSON.stringify(tasks));
            localStorage.setItem('teacher_submissions', JSON.stringify(submissions));
            localStorage.setItem('teacher_studentCount', document.getElementById('studentCount').value);
        }

        function saveAndRender() {
            saveData();
            renderTable();
        }

        // --- 介面操作 ---

        function addTask() {
            const input = document.getElementById('taskName');
            const val = input.value.trim();
            if (!val) return;
            if (tasks.includes(val)) { alert('作業名稱重複囉！'); return; }
            tasks.push(val);
            input.value = '';
            saveAndRender();
        }

        function toggle(studentId, taskName) {
            if (!submissions[studentId]) submissions[studentId] = {};
            submissions[studentId][taskName] = !submissions[studentId][taskName];
            saveAndRender();
        }

        function renderTable() {
            const count = parseInt(document.getElementById('studentCount').value) || 0;
            const header = document.getElementById('tableHeader');
            const body = document.getElementById('tableBody');
            const report = document.getElementById('missingReport');

            // 1. 渲染表頭
            header.innerHTML = '<th class="p-4 border-b-2 border-gray-200 bg-gray-100">座號</th>';
            tasks.forEach((t, index) => {
                header.innerHTML += `
                    <th class="p-4 border-b-2 border-gray-200 bg-gray-100 group">
                        <div class="flex items-center justify-center gap-2">
                            ${t}
                            <button onclick="deleteTask(${index})" class="text-gray-400 hover:text-red-500 text-xs">✕</button>
                        </div>
                    </th>`;
            });

            // 2. 渲染表身
            body.innerHTML = '';
            for (let i = 1; i <= count; i++) {
                let row = `<tr class="bg-white border-b border-gray-100 hover:bg-blue-50 transition-colors">
                            <td class="p-4 font-bold text-gray-500 border-r border-gray-100">${i}</td>`;
                tasks.forEach(t => {
                    const isChecked = submissions[i] && submissions[i][t];
                    row += `
                        <td class="p-0 border-r border-gray-100 touch-area ${isChecked ? 'checked-cell' : ''}" 
                            onclick="toggle(${i}, '${t}')">
                            <div class="flex items-center justify-center h-full w-full text-2xl">
                                ${isChecked ? '✅' : '<span class="text-gray-200 opacity-50">○</span>'}
                            </div>
                        </td>`;
                });
                row += `</tr>`;
                body.innerHTML += row;
            }

            // 3. 渲染未繳名單
            report.innerHTML = '';
            tasks.forEach(t => {
                let missing = [];
                for (let i = 1; i <= count; i++) {
                    if (!submissions[i] || !submissions[i][t]) missing.push(i);
                }
                report.innerHTML += `
                    <div class="p-4 bg-white rounded-xl shadow-sm border border-red-100">
                        <div class="text-sm font-bold text-gray-400 mb-1 uppercase tracking-wider">${t}</div>
                        <div class="text-lg font-bold ${missing.length > 0 ? 'text-red-500' : 'text-emerald-500'}">
                            ${missing.length > 0 ? '未交：' + missing.join(', ') : '✨ 全部繳齊'}
                        </div>
                    </div>`;
            });
        }

        function deleteTask(index) {
            if(confirm(`確定要刪除「${tasks[index]}」這項作業嗎？資料將無法找回。`)) {
                tasks.splice(index, 1);
                saveAndRender();
            }
        }

        function clearAllData() {
            if(confirm('警告：這將會清除所有學生人數、作業名單與勾選紀錄！')) {
                localStorage.clear();
                location.reload();
            }
        }

        function exportExcel() {
            const count = parseInt(document.getElementById('studentCount').value);
            let data = [];
            for (let i = 1; i <= count; i++) {
                let obj = { '座號': i };
                tasks.forEach(t => {
                    obj[t] = (submissions[i] && submissions[i][t]) ? 'V' : '';
                });
                data.push(obj);
            }
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "作業進度表");
            XLSX.writeFile(wb, `學生作業統計_${new Date().toLocaleDateString()}.xlsx`);
        }

        // 啟動系統
        init();
    </script>
</body>
</html>
